<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning in webpages....</title>
    <style>
        body{
            height:1500px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: antiquewhite;
        }
        .st{
            background-color: #238d87;
            position: static;
            padding:20px;
            font-size: larger;
            font-weight: 800;
        }
        .rl{
            background-color: #b54040;
            position: relative;
            padding:20px;
            font-size: larger;
            font-weight: 800;
            top: 20px;
            left: 20px;
        } 
        .parent{
            background-color: #616161;
            width:500px;
            height: 250px;
            position:relative;
            margin:70px;
        }
        /* absolute ek tarah se child ho gaya of parent box so wee can move it any location in parent box */
        .ab{
            background-color:greenyellow;
            position:absolute;
            top:100px;
            right:50px;
        }
        .fx{
            background-color: hsl(59, 60%, 49%);
            position: fixed;
            padding:20px;
            font-size: larger;
            font-weight: 800;
            bottom: 20px;
            right: 20px;

        }
        .si{
            background-color: hsl(298, 56%, 53%);
            position: sticky;
            padding:20px;
            font-size: larger;
            font-weight: 800;
            top:50px;
        }







    </style>
</head>
<body>
    <h1 style="color :#b54040;text-align: center;">Positioning in webpages.... absolute,relative,fixed & sticky</h1>
    <div class="st">static</div>
    <div class="rl">Relative</div>

<div class="parent"> 
    <div class="ab">Absolute</div>
</div>

<div class="si"> sticky</div>
<div class="fx">Fixed</div>


</body>
</html>
