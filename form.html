<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form for jobs in development</title>
</head>
<body>
            <p><h1 style="color:hsl(5, 84%, 46%)"><center> RESUME FORM FOR WEB DEVELOPER JOB😎🔥👍!!! ...</center></h1></p>
    <div border="5px solid black" style="width: 50%; margin:auto; padding: 20px; background-color: hwb(223 8% 23% / 0.265);">
        <form>
            <fieldset>
                <!--legend give name to that fielset -->
                <legend style="color:#e68c27">Persional Information .....</legend>
                    <p><label for="username" >user name:</label>
                    <input type="text" id="username" placeholder="user name" name="username" required></p>

                    <p><label for="phone">phone no. :</label>
                    <input type="number" id="phone"placeholder="phone no." name="phone"></p>

                    <p> <label for="email">E-mail:</label>
                    <input type="email" id="email"placeholder="mail id" name="email" required></p>

                    <p><label for="address">address:</label>
                    <input type="text" id="address"placeholder="full address" name="address"></p>

                    <p><label for="pincode">pincode:</label>
                    <input type="number" id="pincode" name="pincode"></p>

                    <p><label for="city" >city which you are live present time:</label>
                    <input type="text" id="city" name="city"></p>
                    

                    <p><label for="password">password:</label>
                    <input type="password" id="password"placeholder=" enter password" name="password"></p>

                    <p><label for="confirm_password">confirm password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required></p>

                    <p><label for="DOB">Date of birth:</label>
                    <input type="date" id="DOB" name="DOB"></p>

                    <p><label for="resume">uplod you resume file with photo:</label>
                    <input type="file" id="resume"placeholder="upload" name="resume"></p>

                    <p>
                        chose you gender type:- <br>
                        <label><input type= "radio" value="male"name="gender" >male</label>
                        <label><input type= "radio" value="female"name="gender" >female</label>
                        <label><input type= "radio" value="other"name="gender" >other</label>
                    </p>

                    <p>
                        select yor hobbies🤩😎 :- <br>
                        <label><input type= "checkbox" value="cricket"name="cricket" >cricket</label>
                        <label><input type= "checkbox" value="comics"name="comics" >reading comics</label>
                        <label><input type= "checkbox" value="dancing"name="dancing" >dancing</label>
                        <label><input type= "checkbox" value="cooking"name="cooking" >cooking</label>
                        <label><input type= "checkbox" value="content"name="content" >content creation</label>
                        <label><input type= "checkbox" value="coding"name="coding" >coding</label>
                        <label><input type= "checkbox" value="tourism"name="tourism" >tourism/explorations of nature</label>

                    </p>
        <!-- adding buttons  -->
                    <p> 
                        
                        <button type="reset"> click to reset</button> <br>
                        
                        <button type="submit">submit</button>


            </p>
        </fieldset>

        </form>
    </div>    
    
</body>
